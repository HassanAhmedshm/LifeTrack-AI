<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Track AI</title>
    <!-- Ensure Font Awesome is correctly linked -->
    <link rel="stylesheet" href="./fontawesome-free-6.7.1-web/css/all.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <style>
        :root {
            --deep-black: #0f0f0f;
            --dark-grey: #333333;
            --medium-grey: #555555; /* Added for outline */
            --bright-yellow: #f2c464;
            --light-grey: #f2f2f2;
            --white: #ffffff;
            --warm-beige: #c9bbaa; /* Can be used for outlines */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Manrope", sans-serif;
            background-color: var(--deep-black);
            color: var(--white);
            line-height: 1.6;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            /* Increased padding-bottom for bottom nav */
            padding-bottom: 90px;
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: 60px;
            background-color: var(--deep-black);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
            z-index: 1000;
            border-bottom: 1px solid var(--dark-grey);
        }

        /* Default PFP styling */
        .profile-pic-container {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--medium-grey); /* Default bg */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Hide img if it breaks bounds */
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* If an actual image is used */
        }

        .profile-pic-container .default-pfp-icon {
             font-size: 24px; /* Adjust size of default icon */
             color: var(--light-grey); /* Color of default icon */
        }


        .top-bar h1 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .notification i {
            font-size: 1.2rem;
            color: var(--white);
            transition: color 0.3s ease;
        }

        .notification i:hover {
            cursor: pointer;
        }

        .notification i:active {
            color: var(--bright-yellow);
        }

        /* Main Content */
        main {
            margin-top: 70px; /* Adjusted for fixed top bar */
            padding: 1rem;
        }

        /* Section Base Styling */
        .section {
            background-color: var(--dark-grey);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .section-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }


      

        .add-goal-btn {
            background: none;
            border: none;
            color: var(--bright-yellow);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.2rem 0.5rem;
        }

        .header-right{
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .goals-counter {
            color: var(--light-grey);
            font-size: 0.9rem;
        }

        .goals-list {
            margin-bottom: 1rem;
            max-height: 200px; /* Limit initial height if needed */
            overflow-y: auto; /* Scroll if too many goals */
        }

        .goal-item {
            display: flex;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .goal-item:last-child {
            border-bottom: none;
        }


        .goal-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--bright-yellow);
            border-radius: 50%;
            margin-right: 1rem;
            cursor: pointer;
            flex-shrink: 0; /* Prevent shrinking */
        }

        .goal-checkbox.checked {
            background-color: var(--bright-yellow);
            position: relative;
        }

        .goal-checkbox.checked::after {
            content: '✓';
            position: absolute;
            color: var(--deep-black);
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }

        .goal-item span {
            flex-grow: 1;
            margin-right: 0.5rem; /* Space before delete icon */
            word-break: break-word; /* Wrap long text */
        }

        .goal-actions {
            display: flex;
            gap: 0.5rem;
        }

        .delete-goal {
            color: var(--warm-beige); /* Softer delete color */
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.2s ease;
        }
        .delete-goal:hover {
            color: var(--bright-yellow);
        }

        .view-all-btn {
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem; /* Space above button */
            background: transparent;
            border: 1px solid var(--bright-yellow);
            border-radius: 8px;
            color: var(--bright-yellow);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        

        .progress-circles {
            display: grid;
            /* Adjust columns for 3 items */
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem; /* Space before summary */
        }

        .progress-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-align: center; /* Center text */
        }

        /* Nutrition Circle Outline Style */
        .progress-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--medium-grey); /* Outline border */
             /* Use conic-gradient for the progress *fill* inside the border */
            background: conic-gradient(var(--bright-yellow) calc(var(--progress) * 1%), transparent 0);
            /* Remove the ::before pseudo-element fill */
        }

        /* Remove the old ::before if it existed */
         .progress-circle::before {
           display: none;
         }


        .progress-value {
            position: relative; /* Already relative */
            font-size: 1rem;
            font-weight: 600;
            color: var(--white);
        }

        /* Nutrition Summary (Total Cals/Water) */
        .nutrition-summary {
            display: flex;
            justify-content: space-around; /* Space out evenly */
            margin-top: 1.5rem; /* Space above */
            padding-top: 1rem; /* Optional space */
            border-top: 1px solid rgba(255, 255, 255, 0.1); /* Separator line */
            color: var(--light-grey);
            font-size: 0.9rem;
        }
        .nutrition-summary span {
            text-align: center;
        }
        .nutrition-summary .value {
            font-weight: bold;
            color: var(--white);
        }
        .nutrition-summary .goal {
            color: var(--warm-beige);
        }

        .flow-buttons-container {
            display: flex;
            gap: 0.8rem; /* Space between buttons */
            overflow-x: auto; /* Enable horizontal scroll */
            padding: 0.5rem 2px; /* Padding for scrollbar visibility */
             margin-left: -1.5rem; /* Counteract section padding for edge-to-edge feel */
             margin-right: -1.5rem;
             padding-left: 1.5rem;
             padding-right: 1.5rem;

            /* Hide scrollbar visually (cross-browser) */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .flow-buttons-container::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .flow-button {
            flex-shrink: 0; /* Prevent buttons from shrinking */
            background-color: var(--medium-grey); /* Slightly different background */
            border: 1px solid var(--warm-beige); /* Subtle border */
            color: var(--light-grey);
            padding: 0.7rem 1.2rem;
            border-radius: 25px; /* Pill shape */
            cursor: pointer;
            white-space: nowrap; /* Prevent text wrapping */
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
         .flow-button i {
            font-size: 1rem;
            color: var(--bright-yellow); /* Icon color */
         }

        .flow-button:hover, .flow-button:active {
            background-color: var(--dark-grey);
            border-color: var(--bright-yellow);
        }


        #ai-interaction .ai-input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: rgba(255, 255, 255, 0.1); /* Slightly lighter than chat outline */
            padding: 0.5rem;
            border-radius: 30px; /* Pill shape */
            margin-top: 1rem;
        }

        #ai-prompt-input {
            flex-grow: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--light-grey);
            font-size: 1rem;
            padding: 0.4rem 0.5rem;
        }

        #ai-prompt-input::placeholder {
            color: rgba(242, 242, 242, 0.7); /* Lighter placeholder */
        }

        .icon-button {
            background: none;
            border: none;
            outline: none;
            color: var(--light-grey); /* Default/Inactive color for all icons */
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0.3rem; /* Add padding for easier click */
            margin: 0 0.2rem;
            transition: color 0.3s ease;
            display: flex; /* Center icon */
            align-items: center;
            justify-content: center;
        }

        /* Active state specifically for Send Button based on input */
        #ai-send-btn.active {
            color: var(--bright-yellow); /* Active color */
        }

        /* Hover/Active for other buttons */
         #ai-voice-btn:hover, #ai-voice-btn:active,
         #ai-camera-btn:hover, #ai-camera-btn:active {
             color: var(--warm-beige);
         }
        /* Specific active for send */
        #ai-send-btn:active {
             color: var(--bright-yellow); /* Remain yellow when clicked if active */
         }


        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: 70px; /* Standard height */
            background-color: var(--deep-black);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--dark-grey);
            z-index: 1000; /* Ensure it's above content */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem; /* Smaller gap */
            color: var(--light-grey);
            text-decoration: none;
            font-size: 0.75rem; /* Smaller text */
            padding: 0.5rem;
            flex: 1; /* Distribute space evenly */
            text-align: center;
             transition: color 0.2s ease;
        }

        .nav-item i {
            font-size: 1.3rem; /* Slightly larger icons */
             margin-bottom: 2px; /* Space between icon and text */
        }

        .nav-item.active {
            color: var(--bright-yellow);
        }
         .nav-item:hover:not(.active) {
             color: var(--white); /* Highlight on hover */
         }


        /* Responsive Adjustments */
        @media (max-width: 360px) {
            .progress-circles {
                 /* Keep 3 columns or switch to 2? Let's keep 3 but reduce gap */
                gap: 1rem;
            }
            .progress-circle {
                width: 70px;
                height: 70px;
            }
             .progress-value {
                 font-size: 0.9rem;
             }
             .flow-button {
                 padding: 0.6rem 1rem;
                 font-size: 0.85rem;
             }
              .flow-button i {
                font-size: 0.9rem;
              }
        }

         /* Styles for goal input */
         .goal-input-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
         }
         .goal-input {
            flex-grow: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--light-grey);
            padding: 0.5rem;
            border-bottom: 1px solid var(--warm-beige);
         }
         .add-goal-btn2 {
            background-color: var(--bright-yellow);
            color: var(--deep-black);
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
         }
    </style>
</head>

<body>
    <div class="container">

                    <button class="flow-button"><i class="fas fa-book-open"></i> Learn</button> <!-- Example extra button -->

     <!-- Consolidated JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // --- Initialize Progress Circles ---
            const progressCircles = document.querySelectorAll('.progress-circle');
            progressCircles.forEach(circle => {
                const progress = circle.dataset.progress;
                if (!isNaN(progress)) {
                    const percentage = Math.max(0, Math.min(progress, 100)); // Clamp between 0-100
                    // Set the CSS variable used in the background gradient
                    circle.style.setProperty('--progress', percentage);
                } else {
                    circle.style.setProperty('--progress', 0); // Default if no data
                }
            });


            // --- Goals Section Logic ---
            const goalsList = document.querySelector('.goals-list');
            const addGoalBtnHeader = document.querySelector('.goals-section .add-goal-btn');
            const viewAllBtn = document.querySelector('.view-all-btn');
            const goalsCounter = document.querySelector('.goals-counter');
            let isExpanded = false; // For View All toggle
            const maxVisibleGoals = 3; // How many goals to show initially

            function updateGoalsCounter() {
                if (!goalsList) return;
                const totalGoals = goalsList.querySelectorAll('.goal-item').length;
                const completedGoals = goalsList.querySelectorAll('.goal-checkbox.checked').length;
                if (goalsCounter) {
                    goalsCounter.textContent = `${completedGoals}/${totalGoals} Done`;
                }
            }

            function updateGoalsVisibility() {
                 if (!goalsList || !viewAllBtn) return;
                 const goals = goalsList.querySelectorAll('.goal-item');

                if (goals.length > maxVisibleGoals) {
                    viewAllBtn.style.display = 'flex'; // Show the button
                    goals.forEach((goal, index) => {
                        // Hide goals beyond the max limit only if not expanded
                        if (index >= maxVisibleGoals) {
                            goal.style.display = isExpanded ? 'flex' : 'none';
                        } else {
                             goal.style.display = 'flex'; // Ensure first few are always visible
                        }
                    });
                     // Update button text/icon
                    viewAllBtn.innerHTML = isExpanded ?
                        'Show Less <i class="fas fa-chevron-up"></i>' :
                        `View All Goals (${goals.length}) <i class="fas fa-chevron-right"></i>`;
                } else {
                    viewAllBtn.style.display = 'none'; // Hide button if not enough goals
                    goals.forEach(goal => goal.style.display = 'flex'); // Ensure all are visible
                }
            }

             function addGoal(text) {
                 if (!goalsList || !text) return;

                 const newGoalItem = document.createElement('div');
                 newGoalItem.className = 'goal-item';
                 newGoalItem.innerHTML = `
                     <div class="goal-checkbox" aria-label="Mark goal as complete" role="checkbox" aria-checked="false" tabindex="0"></div>
                     <span>${text}</span>
                     <div class="goal-actions">
                         <i class="fas fa-trash delete-goal" aria-label="Delete goal" role="button" tabindex="0"></i>
                     </div>
                 `;
                 goalsList.appendChild(newGoalItem);

                 // Re-attach listeners to the new goal elements
                 attachGoalListeners(newGoalItem);

                 // Update UI
                 updateGoalsCounter();
                 updateGoalsVisibility();
             }

              function attachGoalListeners(goalItem) {
                 if (!goalItem) return;
                 const checkbox = goalItem.querySelector('.goal-checkbox');
                 const deleteBtn = goalItem.querySelector('.delete-goal');

                 // Checkbox toggle
                 checkbox.addEventListener('click', function() {
                     this.classList.toggle('checked');
                      this.setAttribute('aria-checked', this.classList.contains('checked'));
                     updateGoalsCounter();
                 });
                  checkbox.addEventListener('keypress', function(e) { // Accessibility for Enter/Space
                     if (e.key === 'Enter' || e.key === ' ') {
                         e.preventDefault(); // Prevent page scroll on Space
                         this.click();
                     }
                 });


                 // Delete button action
                 deleteBtn.addEventListener('click', () => {
                     goalItem.remove();
                     updateGoalsCounter();
                     updateGoalsVisibility();
                 });
                  deleteBtn.addEventListener('keypress', function(e) { // Accessibility
                     if (e.key === 'Enter' || e.key === ' ') {
                          e.preventDefault();
                          this.click();
                      }
                  });
             }


            // Attach listeners to existing goals on load
            goalsList.querySelectorAll('.goal-item').forEach(attachGoalListeners);

             // "View All" button click
             if(viewAllBtn){
                 viewAllBtn.addEventListener('click', () => {
                    isExpanded = !isExpanded;
                    updateGoalsVisibility();
                 });
             }


            // "Add Goal" button in header click
            if(addGoalBtnHeader) {
                addGoalBtnHeader.addEventListener('click', () => {
                    // Check if input already exists to prevent duplicates
                     const existingInput = goalsList.querySelector('.goal-input-container');
                    if (existingInput) {
                        existingInput.querySelector('.goal-input').focus();
                        return; // Don't add another input box if one exists
                    }

                    // Create input elements
                    const inputContainer = document.createElement('div');
                    inputContainer.className = 'goal-input-container';

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'goal-input';
                    input.placeholder = 'Enter your new goal...';
                     input.setAttribute('aria-label', 'New goal description');

                    const addButton = document.createElement('button');
                    addButton.className = 'add-goal-btn2';
                    addButton.innerHTML = 'Add';
                     addButton.setAttribute('aria-label', 'Confirm adding goal');


                    // Add Goal functionality
                    const confirmAdd = () => {
